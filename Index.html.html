<title>Sathiyavedham — Links</title>
<style>
  :root{
    --bg-1: #0b0d10;
    --bg-2: #16130d;
    --gold: #c9a24b;
    --gold-bright: #e8c877;
    --cream: #f2ece0;
    --muted: #9b9488;
    --line: rgba(201,162,75,0.25);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    min-height: 100%;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(201,162,75,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    color: var(--cream);
    font-family: 'Georgia', 'Iowan Old Style', serif;
    -webkit-font-smoothing: antialiased;
  }

  @media (prefers-reduced-motion: no-preference){
    .mark{ animation: rise 900ms ease-out both; }
    .card{ animation: rise 700ms ease-out both; }
    .card:nth-of-type(1){ animation-delay: 80ms; }
    .card:nth-of-type(2){ animation-delay: 160ms; }
    .card:nth-of-type(3){ animation-delay: 240ms; }
    .card:nth-of-type(4){ animation-delay: 320ms; }
    .card:nth-of-type(5){ animation-delay: 400ms; }
  }
  @keyframes rise{
    from{ opacity: 0; transform: translateY(14px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .wrap{
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(28px, 6vw, 64px) 20px 40px;
  }

  .header{
    width: 100%;
    max-width: 480px;
    text-align: center;
    margin-bottom: clamp(28px, 5vw, 44px);
  }

  .mark{
    width: 64px;
    height: 64px;
    margin: 0 auto 18px;
    display: grid;
    place-items: center;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--gold-bright);
    font-family: 'Trajan Pro', 'Cinzel', Georgia, serif;
    font-size: 22px;
    letter-spacing: 1px;
  }

  h1{
    margin: 0 0 6px;
    font-size: clamp(26px, 6vw, 34px);
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream);
  }

  h1 span{ color: var(--gold-bright); }

  .tagline{
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 12.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .rule{
    width: 46px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
    margin: 18px auto 0;
  }

  .links{
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card{
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--cream);
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
    border: 1px solid var(--line);
    border-radius: 10px;
    transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
  }

  .card:hover,
  .card:focus-visible{
    transform: translateY(-2px);
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(201,162,75,0.10), rgba(201,162,75,0.03));
  }

  .card:focus-visible{
    outline: 2px solid var(--gold-bright);
    outline-offset: 3px;
  }

  .icon{
    flex: none;
    width: 40px;
    height: 40px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--gold-bright);
  }

  .icon svg{ width: 19px; height: 19px; fill: currentColor; }

  .text{ flex: 1; min-width: 0; }

  .name{
    display: block;
    font-size: 16px;
    letter-spacing: 0.04em;
  }

  .handle{
    display: block;
    margin-top: 2px;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .arrow{
    flex: none;
    color: var(--muted);
    font-size: 15px;
    transition: transform 180ms ease, color 180ms ease;
  }

  .card:hover .arrow{ transform: translateX(3px); color: var(--gold-bright); }

  footer{
    margin-top: clamp(32px, 6vw, 48px);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.7;
  }

  @media (max-width: 360px){
    .card{ padding: 14px 16px; gap: 12px; }
    .icon{ width: 36px; height: 36px; }
  }
</style>
